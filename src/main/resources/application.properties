# -------------------------
# Server
# -------------------------
server.port=${PORT:8080}

# -------------------------
# Database
# -------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Turn OFF in prod (leave true only while debugging locally)
spring.jpa.show-sql=${SHOW_SQL:false}

# -------------------------
# Upload limits
# -------------------------
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Where you save uploaded PDFs (Render disk is ephemeral unless you use a persistent disk/S3)
app.upload-dir=${UPLOAD_DIR:uploads}

# -------------------------
# Gemini
# -------------------------
gemini.api.key=${GEMINI_API_KEY}
gemini.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

# -------------------------
# Mail (Gmail SMTP)
# -------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
server.address=0.0.0.0
# Reset password link base (frontend)
app.reset.base-url=${FRONTEND_URL}

# -------------------------
# -------------------------
# Security
# -------------------------
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

